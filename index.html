<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemis II — Live Tracker</title>
<style>
:root{--ui-alpha:0.4}
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#fff}
canvas{display:block}

#loading{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;transition:opacity 1.5s ease}
#loading.done{opacity:0;pointer-events:none}
#loading h1{font-size:14px;font-weight:400;letter-spacing:6px;text-transform:uppercase;color:#778;margin-bottom:20px}
#load-track{width:180px;height:1px;background:#222;border-radius:1px}
#load-fill{height:100%;width:0%;background:#556;border-radius:1px;transition:width .3s}

/* ── All UI auto-hides, revealed by hover zones ── */
.ui-fade{opacity:0;pointer-events:none;transition:opacity .5s}

/* Top-left: focus controls */
#tl-zone{position:fixed;top:0;left:0;width:280px;height:60px;z-index:10}
#tl-zone:hover .ui-fade{opacity:1;pointer-events:auto}
#focus-controls{position:fixed;top:24px;left:24px;z-index:10;display:flex;gap:6px}
.focus-btn{
  padding:7px 14px;border-radius:16px;cursor:pointer;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,var(--ui-alpha));font-size:10px;letter-spacing:1px;
  text-transform:uppercase;font-family:inherit;
  transition:all .3s;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.focus-btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7)}
.focus-btn.active{color:rgba(140,200,255,.75);border-color:rgba(140,200,255,.25);background:rgba(140,200,255,.06)}

/* Top-right: brightness slider */
#tr-zone{position:fixed;top:0;right:0;width:220px;height:60px;z-index:10}
#tr-zone:hover .ui-fade{opacity:1;pointer-events:auto}
#brightness-panel{
  position:fixed;top:22px;right:24px;z-index:10;
  display:flex;align-items:center;gap:10px;
  padding:6px 16px;border-radius:20px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
#brightness-panel label{color:rgba(255,255,255,var(--ui-alpha));font-size:9px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
#brightness-slider{
  -webkit-appearance:none;appearance:none;width:100px;height:2px;
  background:rgba(255,255,255,.12);border-radius:1px;outline:none;cursor:pointer;
}
#brightness-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:10px;height:10px;border-radius:50%;
  background:rgba(255,255,255,.5);border:none;cursor:pointer;transition:background .2s;
}
#brightness-slider::-webkit-slider-thumb:hover{background:rgba(255,255,255,.8)}

/* Top-center: DSN status */
#dsn-zone{position:fixed;top:0;left:50%;transform:translateX(-50%);width:320px;height:50px;z-index:10}
#dsn-zone:hover #dsn-status{opacity:1;pointer-events:auto}
#dsn-status{
  position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:10;
  display:flex;gap:10px;align-items:center;
  padding:6px 14px;border-radius:16px;
  background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  font-size:9px;letter-spacing:1px;color:rgba(255,255,255,.3);text-transform:uppercase;
  transition:opacity .6s;opacity:0;pointer-events:none;
}
#dsn-status .dot{width:5px;height:5px;border-radius:50%;background:#333;transition:background .5s}
#dsn-status .dot.live{background:#4f8;box-shadow:0 0 6px #4f8}
#dsn-status .dish{display:flex;align-items:center;gap:4px}
#dsn-status .range{color:rgba(255,255,255,.2);font-variant-numeric:tabular-nums}

/* Bottom-right: music panel */
#br-zone{position:fixed;bottom:0;right:0;width:380px;height:80px;z-index:10}
#br-zone:hover .ui-fade{opacity:1;pointer-events:auto}
#music-panel.playing~.br-expand{height:240px}
#music-panel{position:fixed;bottom:24px;right:24px;z-index:10;display:flex;flex-direction:column;align-items:flex-end}
#music-expanded{
  display:none;margin-bottom:10px;width:320px;
  background:rgba(8,8,14,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px;
}
#music-expanded.show{display:block}
#yt-url{
  width:100%;padding:9px 12px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  border-radius:8px;color:#bbb;font-size:12px;font-family:inherit;outline:none;
}
#yt-url:focus{border-color:rgba(255,255,255,.18);color:#ddd}
#yt-url::placeholder{color:rgba(255,255,255,.2)}
#yt-player{margin-top:10px;border-radius:10px;overflow:hidden;display:none}
#yt-player iframe{width:292px;height:165px;border:none;border-radius:10px}
#music-btn{
  width:44px;height:44px;border-radius:50%;cursor:pointer;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.35);font-size:18px;
  transition:all .3s;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
}
#music-btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
#music-btn.active{color:rgba(140,200,255,.7);border-color:rgba(140,200,255,.2)}
#music-panel.playing #yt-url{display:none}
#music-panel.playing #music-btn{opacity:0;pointer-events:none;transition:opacity .3s}
#music-panel.playing #music-expanded{background:transparent;border-color:transparent;backdrop-filter:none;-webkit-backdrop-filter:none;padding:0}
#music-panel.playing:hover #yt-url{display:block}
#music-panel.playing:hover #music-btn{opacity:1;pointer-events:auto}
#music-panel.playing:hover #music-expanded{background:rgba(8,8,14,.88);border-color:rgba(255,255,255,.07);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:14px}

/* Bottom-left: mission label, phase, debug */
#bl-zone{position:fixed;bottom:0;left:0;width:240px;height:160px;z-index:10}
#bl-zone:hover .ui-fade{opacity:1;pointer-events:auto}
#mission-label{position:fixed;bottom:28px;left:28px;z-index:10;color:rgba(255,255,255,var(--ui-alpha));font-size:10px;letter-spacing:4px;text-transform:uppercase;text-decoration:none}
#mission-label:hover{color:rgba(255,255,255,.7)}
#phase-label{position:fixed;bottom:48px;left:28px;z-index:10;color:rgba(255,255,255,calc(var(--ui-alpha)*0.7));font-size:9px;letter-spacing:2px;text-transform:uppercase}
#orbits-btn,#rewind-btn,#debug-btn{
  position:fixed;left:28px;z-index:10;
  cursor:pointer;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.2);font-size:8px;letter-spacing:1px;text-transform:uppercase;
  padding:4px 10px;border-radius:10px;font-family:inherit;transition:all .3s;
}
#orbits-btn{bottom:68px}
#orbits-btn.active{color:rgba(140,200,255,.5);border-color:rgba(140,200,255,.15)}
#rewind-btn{bottom:88px}
#rewind-btn.active{color:rgba(255,180,100,.5);border-color:rgba(255,180,100,.15)}
#debug-btn{bottom:108px}
#debug-overlay{
  display:none;position:fixed;top:60px;left:24px;z-index:999;
  color:lime;font-size:10px;font-family:monospace;line-height:1.5;
  background:rgba(0,0,0,.75);padding:10px 14px;border-radius:8px;
  pointer-events:none;white-space:pre;
}
#debug-overlay.show{display:block}
</style>

<div id="loading">
  <h1>Artemis II</h1>
  <div id="load-track"><div id="load-fill"></div></div>
</div>

{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

/* ═══════════════════════════════════════════════════════════════════════
   CONFIGURATION — correct launch time from NASA/JSC
   ═══════════════════════════════════════════════════════════════════════ */
const params = new URLSearchParams(location.search);
const LAUNCH_DATE = new Date(params.get('launch') || '2026-04-01T22:35:12Z');

const EARTH_RADIUS = 10;
const SCALE_KM     = EARTH_RADIUS / 6371.0;
const MOON_RADIUS  = 2.73;

let met, useRealTime = true, timeScale = 1, paused = false;
function initMET() { met = (Date.now() - LAUNCH_DATE.getTime()) / 1000; }
initMET();
function updateMET(dt) {
  if (useRealTime) met = (Date.now() - LAUNCH_DATE.getTime()) / 1000;
  else if (!paused) met += dt * timeScale;
}
function metToJD(t) { return (LAUNCH_DATE.getTime() + t * 1000) / 86400000 + 2440587.5; }


/* ═══════════════════════════════════════════════════════════════════════
   CHEBYSHEV EVALUATOR — Clenshaw recurrence
   ═══════════════════════════════════════════════════════════════════════ */
function evalCheb(c, t) {
  let b1 = 0, b2 = 0;
  for (let i = c.length - 1; i >= 1; i--) {
    const tmp = 2 * t * b1 - b2 + c[i];
    b2 = b1; b1 = tmp;
  }
  return t * b1 - b2 + c[0];
}

function evalBody(body, jd) {
  const segs = body.segments;
  if (jd <= segs[0].t_start) jd = segs[0].t_start + 1e-9;
  if (jd >= segs[segs.length-1].t_end) jd = segs[segs.length-1].t_end - 1e-9;
  let lo = 0, hi = segs.length - 1;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    if (segs[mid].t_end <= jd) lo = mid + 1; else hi = mid;
  }
  const s = segs[lo];
  const tn = 2 * (jd - s.t_start) / (s.t_end - s.t_start) - 1;
  return { x: evalCheb(s.cx, tn), y: evalCheb(s.cy, tn), z: evalCheb(s.cz, tn) };
}

// Ecliptic J2000 → scene coordinates
// Scene: X = ecliptic X, Y(up) = ecliptic Z (north ecliptic pole), Z = ecliptic Y
function eclToScene(x, y, z, scale) {
  return new THREE.Vector3(x * scale, z * scale, y * scale);
}

function bodyScenePos(body, jd) {
  const p = evalBody(body, jd);
  return eclToScene(p.x, p.y, p.z, SCALE_KM);
}

/* ═══════════════════════════════════════════════════════════════════════
   LOAD CHEBYSHEV EPHEMERIS DATA
   ═══════════════════════════════════════════════════════════════════════ */
let cheb, scBody, moonBody, sunBody, CHEB_JD_START, CHEB_JD_END;
let T_CHEB_MET_START, T_MISSION_END, FLYBY_MET;

try {
  const resp = await fetch('geo-ORION-cheb.json');
  cheb = await resp.json();
  scBody = cheb.SC;
  moonBody = cheb.MOON;
  sunBody = cheb.SUN;
  CHEB_JD_START = cheb.time_range.start;
  CHEB_JD_END = cheb.time_range.end;
  T_CHEB_MET_START = (CHEB_JD_START - 2440587.5) * 86400000;
  T_CHEB_MET_START = (T_CHEB_MET_START - LAUNCH_DATE.getTime()) / 1000;
  T_MISSION_END = ((CHEB_JD_END - 2440587.5) * 86400000 - LAUNCH_DATE.getTime()) / 1000;
  FLYBY_MET = (Date.parse('2026-04-06T23:01:12Z') - LAUNCH_DATE.getTime()) / 1000;
  console.log(`Chebyshev: SC ${scBody.segments.length} segs, MOON ${moonBody.segments.length}, SUN ${sunBody.segments.length}`);
  console.log(`MET range: ${(T_CHEB_MET_START/3600).toFixed(1)}h → ${(T_MISSION_END/3600).toFixed(1)}h, flyby at ${(FLYBY_MET/3600).toFixed(1)}h`);
} catch (e) {
  document.getElementById('loading').innerHTML =
    '<h1 style="letter-spacing:3px;margin-bottom:12px">Artemis II</h1>' +
    '<p style="color:#889;font-size:12px;max-width:420px;text-align:center;line-height:1.7">' +
    'Could not load ephemeris data. Serve this folder:<br>' +
    '<code style="color:#aab;background:#111;padding:4px 10px;border-radius:4px;display:inline-block;margin-top:8px">' +
    'python3 -m http.server</code></p>';
  throw e;
}

/* ═══════════════════════════════════════════════════════════════════════
   LOAD REAL ORBITAL DATA (from JPL Horizons)
   ═══════════════════════════════════════════════════════════════════════ */
let orbitData = null;
try {
  const orbResp = await fetch('orbits.json');
  orbitData = await orbResp.json();
  console.log(`Orbits: moon_geo ${orbitData.moon_geo.points.length}, earth_helio ${orbitData.earth_helio.points.length}, moon_helio ${orbitData.moon_helio.points.length}`);
} catch(e) { console.warn('orbits.json not found, orbital paths disabled'); }


/* ═══════════════════════════════════════════════════════════════════════
   POSITION FUNCTIONS — Chebyshev for all bodies
   ═══════════════════════════════════════════════════════════════════════ */
function getMoonPos(t) {
  const jd = metToJD(Math.max(t, 0));
  if (jd >= CHEB_JD_START && jd <= CHEB_JD_END) return bodyScenePos(moonBody, jd);
  // Fallback for times outside data
  return bodyScenePos(moonBody, jd < CHEB_JD_START ? CHEB_JD_START : CHEB_JD_END);
}

function getSunDir(t) {
  const jd = metToJD(Math.max(t, 0));
  if (jd >= CHEB_JD_START && jd <= CHEB_JD_END) return bodyScenePos(sunBody, jd).normalize();
  // Fallback: ecliptic longitude approximation
  const n = jd - 2451545.0;
  const L = ((280.460 + 0.9856474 * n) % 360 + 360) % 360;
  const g = (((357.528 + 0.9856003 * n) % 360 + 360) % 360) * Math.PI / 180;
  const lam = (L + 1.915 * Math.sin(g) + 0.020 * Math.sin(2 * g)) * Math.PI / 180;
  return new THREE.Vector3(Math.cos(lam), 0, Math.sin(lam)).normalize();
}

function getPositionAtMET(t) {
  t = Math.max(0, t);
  const jd = metToJD(t);
  if (jd >= CHEB_JD_START && jd <= CHEB_JD_END) return bodyScenePos(scBody, jd);
  // Clamp to nearest Chebyshev endpoint
  return bodyScenePos(scBody, jd < CHEB_JD_START ? CHEB_JD_START : CHEB_JD_END);
}

function getMissionPhase(t) {
  if (t < 0)                     return 'Pre-Launch';
  if (t <= T_CHEB_MET_START)     return 'Ascent / TLI';
  if (t <= FLYBY_MET - 10800)   return 'Trans-Lunar Coast';
  if (t <= FLYBY_MET + 10800)   return 'Lunar Flyby';
  if (t <= T_MISSION_END - 600) return 'Return Coast';
  if (t <= T_MISSION_END)       return 'Entry Interface';
  return 'Mission Complete';
}

/* ═══════════════════════════════════════════════════════════════════════
   BUILD TRAJECTORY DISPLAY LINE
   ═══════════════════════════════════════════════════════════════════════ */
const chebPts = [];
for (let t = T_CHEB_MET_START; t <= T_MISSION_END; t += 60) chebPts.push(getPositionAtMET(t));
const TRAJ_POINTS = chebPts;
const DISPLAY_N = TRAJ_POINTS.length - 1;

/* ═══════════════════════════════════════════════════════════════════════
   GMST — Earth rotation
   ═══════════════════════════════════════════════════════════════════════ */
function getGMST(date) {
  const JD = date.getTime() / 86400000 + 2440587.5;
  const T = (JD - 2451545.0) / 36525.0;
  let g = 280.46061837 + 360.98564736629 * (JD - 2451545.0) + 0.000387933*T*T - T*T*T/38710000;
  return ((g % 360) + 360) % 360 * Math.PI / 180;
}

/* ═══════════════════════════════════════════════════════════════════════
   LOADING & TEXTURES
   ═══════════════════════════════════════════════════════════════════════ */
const loadFill = document.getElementById('load-fill');
const loadScreen = document.getElementById('loading');
const loadMgr = new THREE.LoadingManager();
loadMgr.onProgress = (_, loaded, total) => { loadFill.style.width = (loaded/total*100)+'%'; };
loadMgr.onLoad = () => { loadFill.style.width = '100%'; setTimeout(() => loadScreen.classList.add('done'), 600); };
const tex = new THREE.TextureLoader(loadMgr);

const TEX_BASE = 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r168/examples/textures/planets/';
const earthDayTex   = tex.load(TEX_BASE + 'earth_atmos_2048.jpg');
const earthNightTex = tex.load(TEX_BASE + 'earth_lights_2048.png');
const earthSpecTex  = tex.load(TEX_BASE + 'earth_specular_2048.jpg');
const earthCloudTex = tex.load(TEX_BASE + 'earth_clouds_1024.png');
// Higher-res Moon texture from Solar System Scope
const moonTex = tex.load('https://upload.wikimedia.org/wikipedia/commons/thumb/d/d1/Solarsystemscope_texture_8k_moon.jpg/2048px-Solarsystemscope_texture_8k_moon.jpg');
[earthDayTex, earthNightTex, earthSpecTex, moonTex].forEach(t => { t.colorSpace = THREE.SRGBColorSpace; });

/* ═══════════════════════════════════════════════════════════════════════
   SCENE SETUP
   ═══════════════════════════════════════════════════════════════════════ */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 600000);
camera.position.set(80, 60, 100);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.5;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);
renderer.domElement.style.cssText = 'display:block;position:fixed;top:0;left:0;z-index:1;width:100vw;height:100vh';

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.04;
controls.minDistance = 5; controls.maxDistance = 400000;
controls.enablePan = true; controls.autoRotate = true; controls.autoRotateSpeed = 0.15;
let interactionTimer;
renderer.domElement.addEventListener('pointerdown', () => { controls.autoRotate = false; clearTimeout(interactionTimer); });
renderer.domElement.addEventListener('pointerup', () => { clearTimeout(interactionTimer); interactionTimer = setTimeout(() => { controls.autoRotate = true; }, 12000); });

/* ═══════════════════════════════════════════════════════════════════════
   STARFIELD
   ═══════════════════════════════════════════════════════════════════════ */
{
  const N = 16000, pos = new Float32Array(N*3), col = new Float32Array(N*3);
  for (let i = 0; i < N; i++) {
    const r = 5000+Math.random()*5000, th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th); pos[i*3+1]=r*Math.sin(ph)*Math.sin(th); pos[i*3+2]=r*Math.cos(ph);
    const t=0.6+Math.random()*0.4; col[i*3]=t; col[i*3+1]=t; col[i*3+2]=0.75+Math.random()*0.25;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const starMat = new THREE.PointsMaterial({ size:1.2, sizeAttenuation:true, vertexColors:true, transparent:true, opacity:0.9 });
  scene.add(new THREE.Points(g, starMat));
  window._starMat = starMat; // stored for brightness control
}

/* ═══════════════════════════════════════════════════════════════════════
   SUN & LIGHTING
   ═══════════════════════════════════════════════════════════════════════ */
const sunDir = getSunDir(Math.max(met, 0));
const sunLight = new THREE.DirectionalLight(0xfff8ee, 7);
sunLight.position.copy(sunDir.clone().multiplyScalar(2000));
scene.add(sunLight);
const ambient = new THREE.AmbientLight(0x1a2030, 0.5);
scene.add(ambient);

const _sgc = document.createElement('canvas'); _sgc.width = _sgc.height = 128;
const _sgx = _sgc.getContext('2d');
const _sgg = _sgx.createRadialGradient(64,64,0,64,64,64);

/* ═══════════════════════════════════════════════════════════════════════
   EARTH — custom shader
   ═══════════════════════════════════════════════════════════════════════ */
const earthUniforms = { tDay:{value:earthDayTex}, tNight:{value:earthNightTex}, tSpecular:{value:earthSpecTex}, sunDir:{value:sunDir}, uStylized:{value:0.35} };
const earthMat = new THREE.ShaderMaterial({
  uniforms: earthUniforms,
  vertexShader: `varying vec2 vUv; varying vec3 vNormal; varying vec3 vViewPos; varying vec3 vSunDirView;
    uniform vec3 sunDir;
    void main(){ vUv=uv; vec4 mv=modelViewMatrix*vec4(position,1.0); vNormal=normalize(normalMatrix*normal); vViewPos=-mv.xyz; vSunDirView=normalize(mat3(viewMatrix)*sunDir); gl_Position=projectionMatrix*mv; }`,
  fragmentShader: `precision highp float;
    uniform sampler2D tDay,tNight,tSpecular; uniform float uStylized;
    varying vec2 vUv; varying vec3 vNormal,vViewPos,vSunDirView;
    void main(){
      vec3 N=normalize(vNormal), L=vSunDirView, V=normalize(vViewPos);
      float NdL=dot(N,L), dayMix=smoothstep(-0.12,0.28,NdL), diff=max(0.0,NdL);
      vec3 dayTex=texture2D(tDay,vUv).rgb, nightTex=texture2D(tNight,vUv).rgb;
      float specMask=texture2D(tSpecular,vUv).r;
      float dayBright=mix(1.15,3.0,uStylized), ambBright=mix(0.05,1.2,uStylized);
      vec3 day=dayTex*(diff*dayBright+ambBright);
      vec3 H=normalize(L+V); float spec=pow(max(0.0,dot(N,H)),50.0);
      day+=vec3(0.5,0.45,0.38)*spec*specMask;
      float nightBoost=mix(1.4,6.0,uStylized);
      vec3 night=nightTex*vec3(1.0,0.82,0.5)*nightBoost + dayTex*0.4*uStylized;
      vec3 color=mix(night,day,dayMix);
      float fresnel=pow(1.0-max(0.0,dot(N,V)),4.0), rimStr=mix(0.1,0.6,uStylized);
      color+=vec3(0.3,0.6,1.0)*fresnel*rimStr*max(0.0,NdL+0.5);
      gl_FragColor=vec4(max(color,0.0),1.0);
    }`,
});
const earth = new THREE.Mesh(new THREE.SphereGeometry(EARTH_RADIUS,128,64), earthMat);
const earthGroup = new THREE.Group();
earthGroup.rotation.z = 23.4 * Math.PI / 180;
earthGroup.add(earth);
scene.add(earthGroup);

const atmosUniforms = { sunDir:{value:sunDir}, uStylized:{value:0.35} };
const atmosphere = new THREE.Mesh(
  new THREE.SphereGeometry(EARTH_RADIUS*1.018,64,32),
  new THREE.ShaderMaterial({
    uniforms: atmosUniforms,
    vertexShader: `uniform vec3 sunDir; varying vec3 vNormal,vViewPos,vSunDirView; void main(){ vNormal=normalize(normalMatrix*normal); vec4 mv=modelViewMatrix*vec4(position,1.0); vViewPos=-mv.xyz; vSunDirView=normalize(mat3(viewMatrix)*sunDir); gl_Position=projectionMatrix*mv; }`,
    fragmentShader: `precision highp float; uniform float uStylized; varying vec3 vNormal,vViewPos,vSunDirView;
      void main(){ vec3 N=normalize(vNormal),V=normalize(vViewPos),L=vSunDirView;
        float rim=pow(1.0-max(0.0,dot(N,V)),3.5), sunFace=max(0.0,dot(N,L)), term=pow(1.0-abs(dot(N,L)),4.0);
        vec3 col=mix(vec3(0.04,0.08,0.25),vec3(0.3,0.6,1.0),sunFace);
        col=mix(col,vec3(0.85,0.35,0.15),term*0.4);
        float alpha=rim*(sunFace*0.6+0.12)*mix(0.85,1.5,uStylized);
        gl_FragColor=vec4(col,alpha); }`,
    transparent:true, side:THREE.FrontSide, depthWrite:false,
  })
);
earthGroup.add(atmosphere);
const clouds = new THREE.Mesh(new THREE.SphereGeometry(EARTH_RADIUS*1.006,64,32),

/* ═══════════════════════════════════════════════════════════════════════
   ORBITAL PATHS — real JPL Horizons data
   Moon geocentric (cyan), Earth heliocentric (gold), Moon heliocentric (teal)
   ═══════════════════════════════════════════════════════════════════════ */
const orbitalPathGroup = new THREE.Group();
scene.add(orbitalPathGroup);
let orbitalPathsVisible = true;

// Materials stored for brightness control
const orbitMaterials = [];

if (orbitData) {
  // ── Moon's orbit around Earth (geocentric, ecliptic J2000, same scale as mission) ──
  // 30 days of real Horizons data — plotted in Earth-centered frame at real km scale
  {
    const pts = orbitData.moon_geo.points.map(p => eclToScene(p[1], p[2], p[3], SCALE_KM));
    pts.push(pts[0].clone()); // close the loop
    const mat = new THREE.LineBasicMaterial({ color: 0x4499dd, transparent: true, opacity: 0.25 });
    orbitMaterials.push(mat);
    orbitalPathGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
  }

  // ── Earth's orbit around the Sun (heliocentric, true km scale) ──
  {
    const earthPts = orbitData.earth_helio.points;
    // Find Earth's heliocentric position closest to now
    const nowJD = metToJD(met);
    let bestIdx = 0, bestDist = Infinity;
    for (let i = 0; i < earthPts.length; i++) {
      const d = Math.abs(earthPts[i][0] - nowJD);
      if (d < bestDist) { bestDist = d; bestIdx = i; }
    }
    const ex = earthPts[bestIdx][1], ey = earthPts[bestIdx][2], ez = earthPts[bestIdx][3];
    const earthR = Math.sqrt(ex*ex + ey*ey + ez*ez);

    // Realistic — true km scale
    const realisticPts = earthPts.map(p =>
      eclToScene(p[1] - ex, p[2] - ey, p[3] - ez, SCALE_KM)
    );
    realisticPts.push(realisticPts[0].clone());
    const realisticMat = new THREE.LineBasicMaterial({ color: 0xccaa44, transparent: true, opacity: 0.12 });
    orbitMaterials.push(realisticMat);
    const earthOrbitRealistic = new THREE.Line(new THREE.BufferGeometry().setFromPoints(realisticPts), realisticMat);
    orbitalPathGroup.add(earthOrbitRealistic);

    window._earthHelioRealisticRadius = earthR * SCALE_KM;

    console.log(`Helio orbit: realistic=${(earthR*SCALE_KM).toFixed(0)}u`);
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   TRAJECTORY LINE
   ═══════════════════════════════════════════════════════════════════════ */
const trajPositions = new Float32Array(TRAJ_POINTS.length*3);
const trajColors = new Float32Array(TRAJ_POINTS.length*3);
for (let i=0; i<TRAJ_POINTS.length; i++) {
  const p = TRAJ_POINTS[i];
  trajPositions[i*3]=p.x; trajPositions[i*3+1]=p.y; trajPositions[i*3+2]=p.z;
  trajColors[i*3]=0.12; trajColors[i*3+1]=0.18; trajColors[i*3+2]=0.3;
}
const trajGeo = new THREE.BufferGeometry();
trajGeo.setAttribute('position', new THREE.BufferAttribute(trajPositions, 3));
trajGeo.setAttribute('color', new THREE.BufferAttribute(trajColors, 3));
const trajLine = new THREE.Line(trajGeo, new THREE.LineBasicMaterial({ vertexColors:true, transparent:true, opacity:0.85 }));
scene.add(trajLine);

let lastTrajIdx = -1;
function updateTrajectoryColors(ci) {
  ci = Math.max(0, Math.min(ci, TRAJ_POINTS.length-1));
  if (ci === lastTrajIdx) return;
  const ca = trajGeo.getAttribute('color');
  const lo = Math.min(lastTrajIdx<0?0:lastTrajIdx, ci), hi = Math.max(lastTrajIdx<0?TRAJ_POINTS.length-1:lastTrajIdx, ci);
  for (let i=lo; i<=hi; i++) {
    if (i<=ci) ca.setXYZ(i, 0.4, 0.65, 1.0);
    else ca.setXYZ(i, 0.12, 0.18, 0.3);
  }
  ca.needsUpdate = true; lastTrajIdx = ci;
}

/* ═══════════════════════════════════════════════════════════════════════
   ORION SPACECRAFT — detailed MPCV (Crew Module + European Service Module)
   ═══════════════════════════════════════════════════════════════════════ */
function createOrion() {
  const g = new THREE.Group();

  /* ── Materials ── */
  const matHeatShield = new THREE.MeshStandardMaterial({color:0x2a1e14,roughness:0.95,metalness:0.1});
  const matAblator    = new THREE.MeshStandardMaterial({color:0x3d3028,roughness:0.85,metalness:0.05});
  const matCMSkin     = new THREE.MeshStandardMaterial({color:0xc8bfa8,roughness:0.5,metalness:0.3});
  const matCMTop      = new THREE.MeshStandardMaterial({color:0x888480,roughness:0.4,metalness:0.5});
  const matSM         = new THREE.MeshStandardMaterial({color:0xc9b96a,roughness:0.3,metalness:0.7}); // gold MLI
  const matSMPanels   = new THREE.MeshStandardMaterial({color:0x888888,roughness:0.5,metalness:0.7});
  const matNozzle     = new THREE.MeshStandardMaterial({color:0x444444,roughness:0.25,metalness:0.95});
  const matSolar      = new THREE.MeshStandardMaterial({color:0x0a1640,roughness:0.15,metalness:0.85,emissive:0x020830,emissiveIntensity:0.2});
  const matSolarBack  = new THREE.MeshStandardMaterial({color:0x222222,roughness:0.5,metalness:0.4});
  const matStrut      = new THREE.MeshStandardMaterial({color:0x666666,roughness:0.4,metalness:0.7});
  const matAdapter    = new THREE.MeshStandardMaterial({color:0x777777,roughness:0.5,metalness:0.5});
  const matWindow     = new THREE.MeshStandardMaterial({color:0x0a0a18,roughness:0.05,metalness:0.95});
  const matMLI        = new THREE.MeshStandardMaterial({color:0xd4c78a,roughness:0.25,metalness:0.65}); // multi-layer insulation
  const matFairing    = new THREE.MeshStandardMaterial({color:0x999999,roughness:0.6,metalness:0.4});

  /* ── Crew Module (CM) — Apollo-derived capsule ── */
  const cmR = 0.50, cmTopR = 0.18, cmH = 0.62;

  // Heat shield (AVCOAT ablator — slightly domed)
  const hsGeo = new THREE.SphereGeometry(cmR, 48, 12, 0, Math.PI*2, 0, Math.PI*0.14);
  const hs = new THREE.Mesh(hsGeo, matHeatShield);
  hs.rotation.x = Math.PI; hs.position.y = -0.03;
  g.add(hs);
  // Ablator edge ring
  const hsRim = new THREE.Mesh(new THREE.TorusGeometry(cmR, 0.015, 12, 48), matAblator);
  hsRim.rotation.x = Math.PI/2; hsRim.position.y = 0;
  g.add(hsRim);

  // CM conical body — using lathe for smoother profile
  const cmProfile = [];
  for (let i = 0; i <= 20; i++) {
    const t = i / 20;
    const r = cmR - (cmR - cmTopR) * Math.pow(t, 0.92); // slight curve
    const y = t * cmH;
    cmProfile.push(new THREE.Vector2(r, y));
  }
  const cmBody = new THREE.Mesh(new THREE.LatheGeometry(cmProfile, 48), matCMSkin);
  cmBody.position.y = 0.02;
  g.add(cmBody);

  // CM top cap (rounded)
  const cmCap = new THREE.Mesh(new THREE.SphereGeometry(cmTopR, 24, 12, 0, Math.PI*2, 0, Math.PI*0.5), matCMTop);
  cmCap.position.y = cmH + 0.02;
  g.add(cmCap);

  // Windows — 4 windows (2 rendezvous + 2 side docking)
  for (let i = 0; i < 4; i++) {
    const a = (i - 1.5) * 0.45;
    const yp = cmH * 0.48 + 0.02;
    const rAtY = cmR - (cmR - cmTopR) * Math.pow(0.48, 0.92);
    const win = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.035, 0.012), matWindow);
    win.position.set(Math.sin(a) * (rAtY + 0.005), yp, Math.cos(a) * (rAtY + 0.005));
    win.lookAt(0, yp, 0); win.rotateY(Math.PI);
    g.add(win);
    // Window frame
    const frame = new THREE.Mesh(new THREE.BoxGeometry(0.058, 0.042, 0.008), matFairing);
    frame.position.copy(win.position);
    frame.rotation.copy(win.rotation);
    g.add(frame);
  }

  // RCS thruster pods on CM (12 thrusters in groups of 3)
  for (let i = 0; i < 4; i++) {
    const a = i * Math.PI / 2 + Math.PI / 4;
    const yp = cmH * 0.25 + 0.02;
    const rAtY = cmR - (cmR - cmTopR) * Math.pow(0.25, 0.92);
    for (let j = 0; j < 3; j++) {
      const thr = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.012, 0.025, 6), matNozzle);
      const aOff = (j - 1) * 0.12;
      thr.position.set(Math.sin(a + aOff) * (rAtY + 0.01), yp + (j - 1) * 0.03, Math.cos(a + aOff) * (rAtY + 0.01));
      thr.rotation.z = Math.PI / 2;
      thr.rotation.y = a;
      g.add(thr);
    }
  }

  // CM-SM adapter ring (spacecraft adapter)
  const adapterY = -0.06;
  const adapter = new THREE.Mesh(new THREE.CylinderGeometry(cmR + 0.008, cmR + 0.015, 0.10, 48, 1, true), matAdapter);
  adapter.position.y = adapterY;
  g.add(adapter);
  // Separation bolt line
  const sepLine = new THREE.Mesh(new THREE.TorusGeometry(cmR + 0.012, 0.004, 6, 48), matNozzle);
  sepLine.rotation.x = Math.PI / 2; sepLine.position.y = adapterY - 0.04;
  g.add(sepLine);

  /* ── European Service Module (ESM) ── */
  const smR = cmR + 0.015, smH = 0.78;
  const smY = adapterY - smH / 2 - 0.06;

  // Main SM cylinder (gold multi-layer insulation)
  const smCyl = new THREE.Mesh(new THREE.CylinderGeometry(smR, smR, smH, 48, 1, true), matSM);
  smCyl.position.y = smY;
  g.add(smCyl);

  // SM bottom cap
  const smBot = new THREE.Mesh(new THREE.CircleGeometry(smR, 48), matSMPanels);
  smBot.rotation.x = Math.PI / 2; smBot.position.y = smY - smH / 2;
  g.add(smBot);

  // SM top cap
  const smTop = new THREE.Mesh(new THREE.CircleGeometry(smR, 48), matSMPanels);
  smTop.rotation.x = -Math.PI / 2; smTop.position.y = smY + smH / 2;
  g.add(smTop);

  // SM horizontal panel bands (structural rings)
  for (let i = 0; i < 5; i++) {
    const band = new THREE.Mesh(new THREE.TorusGeometry(smR + 0.003, 0.005, 6, 48), matSMPanels);
    band.rotation.x = Math.PI / 2;
    band.position.y = smY - smH * 0.4 + i * smH * 0.2;
    g.add(band);
  }

  // Vertical stiffener ribs on SM
  for (let i = 0; i < 8; i++) {
    const a = i * Math.PI / 4;
    const rib = new THREE.Mesh(new THREE.BoxGeometry(0.006, smH * 0.9, 0.006), matSMPanels);
    rib.position.set(Math.sin(a) * (smR + 0.003), smY, Math.cos(a) * (smR + 0.003));
    g.add(rib);
  }

  // SM radiator panels (2 deployed, white/silver)
  for (let i = 0; i < 2; i++) {
    const a = i * Math.PI;
    const radGroup = new THREE.Group();
    const rad = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.22, 0.006),
      new THREE.MeshStandardMaterial({color:0xdddddd, roughness:0.25, metalness:0.6, side: THREE.DoubleSide}));
    rad.position.x = smR + 0.17;
    radGroup.add(rad);
    // Radiator hinge
    const hinge = new THREE.Mesh(new THREE.CylinderGeometry(0.006, 0.006, 0.22, 6), matStrut);
    hinge.position.x = smR + 0.01;
    radGroup.add(hinge);
    radGroup.position.y = smY + 0.1;
    radGroup.rotation.y = a;
    g.add(radGroup);
  }

  // Umbilical fairings (cable conduits along SM)
  for (let i = 0; i < 2; i++) {
    const a = i * Math.PI + Math.PI / 2;
    const cond = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, smH * 0.7, 6), matMLI);
    cond.position.set(Math.sin(a) * (smR + 0.015), smY, Math.cos(a) * (smR + 0.015));
    g.add(cond);
  }

  /* ── Main engine nozzle (OMS-E, derived from Shuttle OMS) ── */
  // Bell shape using lathe
  const nozzleProfile = [];
  for (let i = 0; i <= 15; i++) {
    const t = i / 15;
    const r = 0.04 + 0.10 * Math.pow(t, 0.6);
    nozzleProfile.push(new THREE.Vector2(r, -t * 0.28));
  }
  const nozzleBell = new THREE.Mesh(new THREE.LatheGeometry(nozzleProfile, 24), matNozzle);
  nozzleBell.position.y = smY - smH / 2;
  g.add(nozzleBell);
  // Inner nozzle glow hint
  const nozzleInner = new THREE.Mesh(new THREE.CircleGeometry(0.04, 16),
    new THREE.MeshBasicMaterial({color:0x1a1a1a}));
  nozzleInner.rotation.x = Math.PI / 2; nozzleInner.position.y = smY - smH / 2 + 0.01;
  g.add(nozzleInner);

  // Auxiliary thrusters — 8 bipropellant thrusters around SM base
  for (let i = 0; i < 8; i++) {
    const a = i * Math.PI / 4;
    const thrGroup = new THREE.Group();
    const thr = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.018, 0.05, 8), matNozzle);
    thr.position.y = -0.025;
    thrGroup.add(thr);
    const thrMount = new THREE.Mesh(new THREE.BoxGeometry(0.022, 0.015, 0.022), matSMPanels);
    thrMount.position.y = 0.005;
    thrGroup.add(thrMount);
    thrGroup.position.set(Math.sin(a) * (smR + 0.01), smY - smH / 2 + 0.02, Math.cos(a) * (smR + 0.01));
    g.add(thrGroup);
  }

  /* ── Solar Array Wings (4 in X-configuration, ESM heritage from ATV) ── */
  const wingLen = 3.2, wingW = 0.50, wingSegments = 3;
  for (let i = 0; i < 4; i++) {
    const a = i * Math.PI / 2 + Math.PI / 4; // 45° offset → X pattern
    const wingGroup = new THREE.Group();
    wingGroup.position.y = smY + 0.05;

    // Deployment boom (two parallel struts)
    for (let b = 0; b < 2; b++) {
      const strut = new THREE.Mesh(new THREE.CylinderGeometry(0.005, 0.005, wingLen, 4), matStrut);
      strut.rotation.z = Math.PI / 2;
      strut.position.set(wingLen / 2 + smR, 0, (b - 0.5) * 0.06);
      wingGroup.add(strut);
    }

    // Solar panel segments with cell grid pattern
    for (let s = 0; s < wingSegments; s++) {
      const segLen = wingLen / wingSegments;
      const panelX = smR + 0.12 + s * segLen + segLen / 2;

      // Main panel (front = solar cells, back = backing)
      const panel = new THREE.Mesh(
        new THREE.BoxGeometry(segLen - 0.03, wingW, 0.005),
        [matSolarBack, matSolarBack, matSolarBack, matSolarBack, matSolar, matSolarBack]
      );
      panel.position.set(panelX, 0, 0);
      wingGroup.add(panel);

      // Cell divider grid — horizontal
      for (let gl = 0; gl < 4; gl++) {
        const gridH = new THREE.Mesh(new THREE.BoxGeometry(segLen - 0.03, 0.002, 0.007), matStrut);
        gridH.position.set(panelX, -wingW / 2 + wingW * (gl + 1) / 5, 0);
        wingGroup.add(gridH);
      }
      // Cell divider grid — vertical
      for (let gl = 0; gl < 6; gl++) {
        const gridV = new THREE.Mesh(new THREE.BoxGeometry(0.002, wingW, 0.007), matStrut);
        gridV.position.set(panelX - segLen / 2 + segLen * (gl + 1) / 7, 0, 0);
        wingGroup.add(gridV);
      }

      // Inter-segment hinge
      if (s < wingSegments - 1) {
        const hinge = new THREE.Mesh(new THREE.CylinderGeometry(0.006, 0.006, wingW * 0.8, 6), matStrut);
        hinge.position.set(panelX + segLen / 2 - 0.01, 0, 0);
        wingGroup.add(hinge);
      }
    }

    wingGroup.rotation.y = a;
    g.add(wingGroup);
  }

  /* ── Launch Abort System tower (on top during ascent — kept for visual) ── */
  // Docking adapter / forward bay cover
  const dock = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.10, 0.06, 16), matAdapter);
  dock.position.y = cmH + 0.06;
  g.add(dock);
  const dockRing = new THREE.Mesh(new THREE.TorusGeometry(0.07, 0.008, 8, 16), matFairing);
  dockRing.rotation.x = Math.PI / 2; dockRing.position.y = cmH + 0.09;
  g.add(dockRing);
  // Docking probe
  const probe = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.04, 8), matAdapter);
  probe.position.y = cmH + 0.11;
  g.add(probe);

  /* ── Antennas ── */
  // Phased array antenna (flat panel)
  const paAnt = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.008), matFairing);
  paAnt.position.set(0, cmH * 0.7, cmTopR + (cmR - cmTopR) * 0.35);
  g.add(paAnt);

  // Omni antennas (2 whip antennas)
  for (let i = 0; i < 2; i++) {
    const a = i * Math.PI + Math.PI / 3;
    const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.002, 0.002, 0.18, 4), matStrut);
    ant.position.set(Math.sin(a) * cmR * 0.35, cmH + 0.14, Math.cos(a) * cmR * 0.35);
    ant.rotation.z = 0.25 * (i === 0 ? 1 : -1);
    g.add(ant);
    // Antenna tip
    const tip = new THREE.Mesh(new THREE.SphereGeometry(0.005, 6, 4), matFairing);
    tip.position.set(
      Math.sin(a) * cmR * 0.35 + Math.sin(0.25 * (i === 0 ? 1 : -1)) * 0.09,
      cmH + 0.23,
      Math.cos(a) * cmR * 0.35
    );
    g.add(tip);
  }

  g.scale.setScalar(0.9);
  return g;
}

let orion = createOrion();
scene.add(orion);
try {
  const gltfResp = await fetch('orion.glb', { method: 'HEAD' });
  if (gltfResp.ok) {
    const gltfLoader = new GLTFLoader();
    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/libs/draco/');
    gltfLoader.setDRACOLoader(dracoLoader);
    const gltf = await gltfLoader.loadAsync('orion.glb');
    const model = gltf.scene;
    // Auto-scale: fit model to ~2 unit bounding box
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    model.scale.setScalar(2.0 / maxDim);
    // Center the model
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center.multiplyScalar(2.0 / maxDim));
    scene.remove(orion);
    orion = new THREE.Group();
    orion.add(model);
    orion.add(new THREE.PointLight(0x88aaff, 0.6, 12));
    scene.add(orion);
    console.log('Loaded orion.glb model');
  }
} catch (e) { /* no GLB file — using procedural model */ }
const marker = new THREE.Mesh(new THREE.SphereGeometry(0.6,8,8), new THREE.MeshBasicMaterial({color:0x88bbff,transparent:true,opacity:0.6}));
scene.add(marker);

/* ═══════════════════════════════════════════════════════════════════════
   ANIMATION
   ═══════════════════════════════════════════════════════════════════════ */
const clock = new THREE.Clock();
const phaseLabel = document.getElementById('phase-label');
const debugOverlay = document.getElementById('debug-overlay');
let debugOn = false, dbgFrame = 0;

function animate() {
  requestAnimationFrame(animate);
  try {
    const dt = clock.getDelta();
    updateMET(dt);

    // Auto-stop rewind when it reaches current time
    if (rewinding && met >= rewindTargetMET) {
      met = rewindTargetMET;
      rewinding = false;
      useRealTime = true;
      paused = false;
      timeScale = 1;
      rewindBtn.classList.remove('active');
      rewindBtn.textContent = '⏪ Rewind';
    }

    const curDate = new Date(LAUNCH_DATE.getTime() + Math.max(met,0)*1000);

    // Sun — from Chebyshev data (real position)
    const sd = getSunDir(met);
    sunDir.copy(sd);
    if (realisticMode) {
      // True-scale Sun position from Chebyshev data (not normalized)
      const jd = metToJD(Math.max(met, 0));
      const sunPos = (jd >= CHEB_JD_START && jd <= CHEB_JD_END)
        ? bodyScenePos(sunBody, jd)
        : sd.clone().multiplyScalar(window._earthHelioRealisticRadius || 234000);
      sunLight.position.copy(sunPos);
      sunGlow.position.copy(sunPos);
      const sunDist = sunPos.length();
      // Sun radius ~695,700 km → scene units; glow ~4x that for visibility
      const sunRadiusScene = 695700 * SCALE_KM;
      sunGlow.scale.setScalar(sunRadiusScene * 8);
      sunGlow.material.opacity = 1.0;
      // Show sun sphere in realistic mode
      if (window._sunSphere) { window._sunSphere.position.copy(sunPos); window._sunSphere.visible = true; window._sunSphere.scale.setScalar(1); }
    } else {
      sunLight.position.copy(sd.clone().multiplyScalar(2000));
      sunGlow.position.copy(sd.clone().multiplyScalar(4000));
      sunGlow.scale.setScalar(500);
      sunGlow.material.opacity = 1.0;
      if (window._sunSphere) window._sunSphere.visible = false;
    }

    // Earth — GMST rotation for accurate continent illumination
    const gmst = getGMST(curDate);
    earth.rotation.y = gmst;
    clouds.rotation.y = gmst + 0.003 * Math.max(met,0);

    // Moon — from Chebyshev data (real position)
    moonMesh.position.copy(getMoonPos(met));
    moonMesh.rotation.y += dt * 0.008;

    // Spacecraft
    const active = met >= 0 && met <= T_MISSION_END;
    orion.visible = marker.visible = active;
    if (active) {
      const cp = getPositionAtMET(met);
      const cl = getPositionAtMET(Math.min(met+120, T_MISSION_END));
      orion.position.copy(cp); marker.position.copy(cp);
      const dir = cl.clone().sub(cp);
      if (dir.lengthSq() > 0.001) { orion.lookAt(cl); orion.rotateX(Math.PI/2); }
      updateTrajectoryColors(Math.floor(met/T_MISSION_END*DISPLAY_N));
      marker.material.opacity = 0.5;
      marker.scale.setScalar(1);
    }
    phaseLabel.textContent = getMissionPhase(met);

    if (focusTarget) {
      let fp;
      switch(focusTarget){
        case'earth':fp=new THREE.Vector3(0,0,0);break;
        case'moon':fp=moonMesh.position;break;
        case'orion':fp=orion.visible?orion.position:null;break;
      }
      if(fp) controls.target.lerp(fp, 0.045);
    }

    // Debug overlay
    if (debugOn && ++dbgFrame % 15 === 0) {
      const cp=camera.position, mp=moonMesh.position, op=orion.position;
      debugOverlay.textContent =
        `cam: ${cp.x.toFixed(0)}, ${cp.y.toFixed(0)}, ${cp.z.toFixed(0)}\n`+
        `MET: ${(met/3600).toFixed(2)}h (${(met/86400).toFixed(2)}d)\n`+
        `phase: ${getMissionPhase(met)}\n`+
        `moon: ${mp.x.toFixed(0)}, ${mp.y.toFixed(0)}, ${mp.z.toFixed(0)} (${mp.length().toFixed(0)}u)\n`+
        `orion: ${op.x.toFixed(0)}, ${op.y.toFixed(0)}, ${op.z.toFixed(0)} (${op.length().toFixed(0)}u)\n`+
        `sun: ${sunDir.x.toFixed(3)}, ${sunDir.y.toFixed(3)}, ${sunDir.z.toFixed(3)}\n`+
        `traj pts: ${TRAJ_POINTS.length} | cheb segs: ${scBody.segments.length}\n`+
        `fps: ${(1/dt).toFixed(0)} | gmst: ${(gmst*180/Math.PI).toFixed(1)}°`;
    }

    controls.update();
    renderer.render(scene, camera);
  } catch(e) { console.error('Render:', e); }
}
animate();

/* ═══════════════════════════════════════════════════════════════════════
   BRIGHTNESS SLIDER — continuous 0-100 range
   ═══════════════════════════════════════════════════════════════════════ */
const brightnessSlider = document.getElementById('brightness-slider');
function applyBrightness(v) {
  const t = v / 100; // 0..1
  // Lighting & shaders
  earthUniforms.uStylized.value = atmosUniforms.uStylized.value = t;
  sunLight.intensity = 7 + t * 8;
  ambient.intensity = 0.6 + t * 2.5;
  renderer.toneMappingExposure = 1.8 + t * 1.2;
  clouds.material.opacity = 0.3 + t * 0.2;
  // Stars
  if (window._starMat) window._starMat.opacity = 0.5 + t * 0.5;
  // Orbit lines
  orbitMaterials.forEach(m => { m.opacity = 0.1 + t * 0.5; });
  // Trajectory line
  if (trajLine) trajLine.material.opacity = 0.4 + t * 0.6;
  // UI elements — scale text opacity with brightness
  const uiAlpha = 0.15 + t * 0.55;
  document.documentElement.style.setProperty('--ui-alpha', uiAlpha);
}
brightnessSlider.addEventListener('input', () => applyBrightness(+brightnessSlider.value));
applyBrightness(+brightnessSlider.value);

/* ═══════════════════════════════════════════════════════════════════════
   YOUTUBE MUSIC
   ═══════════════════════════════════════════════════════════════════════ */
const musicBtn = document.getElementById('music-btn');
const musicPanel = document.getElementById('music-expanded');
const ytUrl = document.getElementById('yt-url');
const ytPlayer = document.getElementById('yt-player');
musicBtn.addEventListener('click', () => { musicPanel.classList.toggle('show'); musicBtn.classList.toggle('active', musicPanel.classList.contains('show')); });
function getYouTubeId(url) { const m=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/|music\.youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/); return m?m[1]:null; }
ytUrl.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const id = getYouTubeId(ytUrl.value.trim());
  if (!id) return;
  ytPlayer.style.display = 'block';
  ytPlayer.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&loop=1&playlist=${id}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
  document.getElementById('music-panel').classList.add('playing');
});

/* ═══════════════════════════════════════════════════════════════════════
   FOCUS CONTROLS
   ═══════════════════════════════════════════════════════════════════════ */
let focusTarget = null;
document.querySelectorAll('.focus-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const t = btn.dataset.target;
    if (focusTarget === t) { focusTarget = null; btn.classList.remove('active'); }
    else { document.querySelectorAll('.focus-btn').forEach(b=>b.classList.remove('active')); focusTarget = t; btn.classList.add('active'); controls.autoRotate = true; }
  });
});

/* ═══════════════════════════════════════════════════════════════════════
   ORBITS TOGGLE
   ═══════════════════════════════════════════════════════════════════════ */
const orbitsBtn = document.getElementById('orbits-btn');
orbitsBtn.classList.add('active');
orbitsBtn.addEventListener('click', () => {
  orbitalPathsVisible = !orbitalPathsVisible;
  orbitalPathGroup.visible = orbitalPathsVisible;
  orbitsBtn.classList.toggle('active', orbitalPathsVisible);
});


/* ═══════════════════════════════════════════════════════════════════════
   REALISTIC MODE — always on, push starfield to true-scale distances
   ═══════════════════════════════════════════════════════════════════════ */
const realisticMode = true;
// Push starfield out to wrap realistic-scale scene
scene.children.forEach(c => {
  if (c.isPoints && c.geometry.getAttribute('position').count > 10000) {
    const pos = c.geometry.getAttribute('position');
    const r = window._earthHelioRealisticRadius || 234000;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
      const d = Math.sqrt(x*x+y*y+z*z);
      const s = (r * 1.5 + Math.random() * r) / d;
      pos.setXYZ(i, x*s, y*s, z*s);
    }
    pos.needsUpdate = true;
    c.geometry.computeBoundingSphere();
  }
});

/* ═══════════════════════════════════════════════════════════════════════
   REWIND — replay mission from earliest Chebyshev data (~T+3.4h)
   ═══════════════════════════════════════════════════════════════════════ */
const rewindBtn = document.getElementById('rewind-btn');
let rewinding = false, rewindTargetMET = 0;
rewindBtn.addEventListener('click', () => {
  if (!rewinding) {
    // Calculate timeScale so playback takes ~60 seconds
    const currentMET = (Date.now() - LAUNCH_DATE.getTime()) / 1000;
    const missionSpan = Math.max(currentMET - T_CHEB_MET_START, 60);
    rewinding = true;
    rewindTargetMET = currentMET;
    useRealTime = false;
    paused = false;
    met = T_CHEB_MET_START;
    timeScale = missionSpan / 60; // finish in ~60 seconds
    rewindBtn.classList.add('active');
    rewindBtn.textContent = '⏹ Live';
  } else {
    // Return to real-time
    rewinding = false;
    useRealTime = true;
    paused = false;
    initMET();
    timeScale = 1;
    rewindBtn.classList.remove('active');
    rewindBtn.textContent = '⏪ Rewind';
  }
});

/* ═══════════════════════════════════════════════════════════════════════
   DEBUG BUTTON
   ═══════════════════════════════════════════════════════════════════════ */
document.getElementById('debug-btn').addEventListener('click', () => {
  debugOn = !debugOn;
  debugOverlay.classList.toggle('show', debugOn);
});

/* ═══════════════════════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
   ═══════════════════════════════════════════════════════════════════════ */
function setFocus(t) { document.querySelectorAll('.focus-btn').forEach(b=>b.classList.toggle('active',b.dataset.target===t)); focusTarget=t; }
window.addEventListener('keydown', (e) => {
  if (e.target.tagName==='INPUT') return;
  switch(e.key){
    case' ':e.preventDefault();if(useRealTime)useRealTime=false;paused=!paused;break;
    case'[':if(useRealTime)useRealTime=false;timeScale=Math.max(1,timeScale/5);break;
    case']':if(useRealTime)useRealTime=false;timeScale=Math.min(500000,timeScale*5);break;
    case'r':case'R':useRealTime=true;paused=false;initMET();break;
    case'1':setFocus('earth');break;case'2':setFocus('moon');break;case'3':setFocus('orion');break;
    case'0':focusTarget=null;document.querySelectorAll('.focus-btn').forEach(b=>b.classList.remove('active'));break;
  }
});

/* ═══════════════════════════════════════════════════════════════════════
   DSN LIVE FEED — poll Deep Space Network status for Artemis II (EM2)
   ═══════════════════════════════════════════════════════════════════════ */
const dsnD1 = document.getElementById('dsn-d1');
const dsnD2 = document.getElementById('dsn-d2');
const dsnRange = document.getElementById('dsn-range');

async function pollDSN() {
  try {
    const resp = await fetch('https://eyes.nasa.gov/dsn/data/dsn.xml');
    const text = await resp.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, 'text/xml');
    const dishes = xml.querySelectorAll('dish');
    const em2Dishes = [];
    dishes.forEach(d => {
      const targets = d.querySelectorAll('target');
      targets.forEach(t => {
        if (t.getAttribute('name') === 'EM2') {
          const upleg = parseFloat(t.getAttribute('uplegRange')) || 0;
          const downleg = parseFloat(t.getAttribute('downlegRange')) || 0;
          const rtlt = parseFloat(t.getAttribute('rtlt')) || 0;
          em2Dishes.push({
            name: d.getAttribute('name'),
            range: Math.max(upleg, downleg),
            rtlt: rtlt,
            signals: d.querySelectorAll('downSignal[active="true"]').length
          });
        }
      });
    });
    if (em2Dishes.length >= 1) {
      dsnD1.querySelector('.dot').classList.add('live');
      dsnD1.querySelector('.name').textContent = em2Dishes[0].name;
      if (em2Dishes.length >= 2) {
        dsnD2.querySelector('.dot').classList.add('live');
        dsnD2.querySelector('.name').textContent = em2Dishes[1].name;
      } else {
        dsnD2.querySelector('.dot').classList.remove('live');
        dsnD2.querySelector('.name').textContent = '—';
      }
      const rangeKm = em2Dishes[0].range;
      dsnRange.textContent = rangeKm > 0 ? `${(rangeKm/1000).toFixed(0)}k km` : '—';
    } else {
      dsnD1.querySelector('.dot').classList.remove('live');
      dsnD2.querySelector('.dot').classList.remove('live');
      dsnD1.querySelector('.name').textContent = '—';
      dsnD2.querySelector('.name').textContent = '—';
      dsnRange.textContent = 'no signal';
    }
  } catch(e) { console.warn('DSN poll failed:', e); }
}
pollDSN();
setInterval(pollDSN, 5000);
