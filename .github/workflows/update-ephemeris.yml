name: Update Ephemeris

on:
  schedule:
    # Run every 6 hours during the mission (Apr 2–11 2026)
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest ephemeris from HORIZONS
        run: python update-ephemeris.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet geo-ORION-cheb.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add geo-ORION-cheb.json
          git commit -m "Auto-update ephemeris from HORIZONS $(date -u +%Y-%m-%dT%H:%M)"
          git push
